[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm next build && pnpm tsup src/server.ts --format esm --platform node --target node20 --out-dir dist --no-splitting --no-minify"

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
